version: '3.8'
services:
  db:
    image: postgres:15
    container_name: smartcart-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartcart
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: smartcart-mq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:alpine
    container_name: smartcart-cache
    ports:
      - "6379:6379"